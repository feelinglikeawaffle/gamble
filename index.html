<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slot-container">
    <h1>Slot Machine</h1>

    <div class="money">Money: <span id="money">$1,000</span></div>

    <div class="slot-grid" id="slot-grid"></div>

    <div class="controls">
      <label>Bet:</label>
      <input type="number" id="bet" value="50" min="1">
      <button id="spin-btn">SPIN</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
